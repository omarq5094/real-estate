<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل مستخدم | شركة أصحاب التميز العقارية</title>
  <meta
    name="description"
    content="صفحة تسجيل مستخدمين بسيطة وربط مباشر مع Google Sheets."
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="brand-badge">AT</span>
        <div>
          <div class="brand-title">شركة أصحاب التميز العقارية</div>
          <div class="brand-subtitle">Real Estate • Modern Experience</div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="properties.html">العقارات</a>
        <a href="register.html" class="active">تسجيل</a>
        <a href="login.html">دخول</a>
        <a href="index.html#contact">تواصل</a>
      </nav>

      <a class="btn btn-primary desktop-only" href="properties.html">
        استعرض العقارات
      </a>

      <button class="menu-toggle" id="menuToggle" aria-label="فتح القائمة">
        ☰
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">الرئيسية</a>
      <a href="properties.html">العقارات</a>
      <a href="register.html">تسجيل</a>
      <a href="login.html">دخول</a>
      <a href="index.html#contact">تواصل</a>
    </div>
  </header>

  <main class="container" style="padding: 60px 0;">
    <section
      class="glass-card"
      style="max-width: 560px; margin: 0 auto; padding: 30px; border-radius: 28px;"
    >
      <span class="section-kicker">تسجيل</span>
      <h1 class="section-title" style="margin-bottom: 12px;">إنشاء حساب جديد</h1>
      <p class="section-text" style="margin-bottom: 24px;">
        أدخل رقم الجوال وكلمة المرور لإنشاء حساب جديد.
      </p>

      <form id="registerForm" style="display: grid; gap: 16px;">
        <div class="filter-field">
          <label for="phone">رقم الجوال</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="05xxxxxxxx"
            required
          />
        </div>

        <div class="filter-field">
          <label for="password">كلمة المرور</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="أدخل كلمة المرور"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary">
          إنشاء حساب
        </button>
      </form>

      <div id="msg"></div>

      <div style="margin-top: 18px; color: var(--muted);">
        لديك حساب بالفعل؟
        <a href="login.html" style="color: var(--primary); font-weight: 800;">تسجيل الدخول</a>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/register.js"></script>
</body>
</html>
