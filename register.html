<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل مستخدم</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="container" style="padding: 60px 0;">
    <section class="glass-card" style="max-width: 520px; margin: 0 auto; padding: 28px; border-radius: 28px;">
      <span class="section-kicker">تسجيل</span>
      <h1 class="section-title" style="margin-bottom: 12px;">إنشاء حساب</h1>
      <p class="section-text" style="margin-bottom: 24px;">
        أدخل رقم الجوال وكلمة المرور.
      </p>

      <form id="registerForm" style="display: grid; gap: 16px;">
        <div class="filter-field">
          <label for="phone">رقم الجوال</label>
          <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx" required />
        </div>

        <div class="filter-field">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required />
        </div>

        <button type="submit" class="btn btn-primary">تسجيل</button>
      </form>

      <div id="formMessage" class="status-box hidden" style="margin-top: 18px;"></div>
    </section>
  </main>

  <script src="assets/js/register.js"></script>
</body>
</html>
